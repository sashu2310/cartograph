<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cartograph v2</title>
<script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
<style>
  :root {
    --bg: #0b0d13;
    --bg-panel: #131621;
    --bg-hover: #1b1f2e;
    --border: #232737;
    --text: #cbd0e0;
    --text-dim: #6b7084;
    --text-bright: #e8ebf4;
    --accent: #60a5fa;
    --accent-purple: #a78bfa;
    --accent-amber: #fbbf24;
    --accent-cyan: #22d3ee;
    --accent-green: #34d399;
    --accent-red: #f87171;
    --accent-pink: #f472b6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    display: grid;
    grid-template-columns: 320px 1fr 360px;
    grid-template-rows: 52px 1fr;
    height: 100vh;
    font-size: 13px;
    line-height: 1.5;
  }

  body.detail-closed { grid-template-columns: 320px 1fr 0; }

  #header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-weight: 700;
    color: var(--accent);
    font-size: 14px;
    letter-spacing: 0.5px;
  }

  .logo::before { content: "▲ "; color: var(--accent-purple); }

  .project-name {
    color: var(--text-dim);
    font-size: 12px;
    max-width: 260px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #search {
    flex: 1;
    max-width: 420px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 12px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
  }

  #search:focus {
    outline: none;
    border-color: var(--accent);
  }

  #stats {
    margin-left: auto;
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: var(--text-dim);
  }

  #stats span b {
    color: var(--text-bright);
    font-weight: 600;
    margin-right: 4px;
  }

  #sidebar {
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 0;
  }

  .group {
    margin-bottom: 20px;
  }

  .group h3 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-dim);
    padding: 0 20px 8px;
    font-weight: 600;
  }

  .group h3 .count {
    float: right;
    color: var(--text-dim);
    font-weight: 400;
  }

  .entry-item {
    padding: 6px 20px;
    font-size: 12px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.1s, border-color 0.1s;
  }

  .entry-item:hover { background: var(--bg-hover); }

  .entry-item.active {
    background: var(--bg-hover);
    border-left-color: var(--accent);
  }

  .entry-item .qname {
    color: var(--text-bright);
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .entry-item .trigger {
    color: var(--text-dim);
    font-size: 10px;
    margin-top: 2px;
  }

  #canvas {
    position: relative;
    background: var(--bg);
    overflow: hidden;
  }

  #cy { width: 100%; height: 100%; }

  #legend {
    position: absolute;
    bottom: 16px;
    left: 16px;
    background: rgba(19, 22, 33, 0.9);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    font-size: 10px;
    display: flex;
    gap: 14px;
    backdrop-filter: blur(8px);
  }

  #legend .swatch {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    margin-right: 5px;
    vertical-align: middle;
  }

  #empty-state {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
  }

  #detail {
    background: var(--bg-panel);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    transition: width 0.15s;
  }

  body.detail-closed #detail { width: 0; border-left: 0; }

  #detail-content {
    padding: 20px;
  }

  #detail .close {
    float: right;
    color: var(--text-dim);
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 3px;
  }

  #detail .close:hover { background: var(--bg-hover); color: var(--text); }

  #detail h2 {
    font-size: 12px;
    color: var(--text-bright);
    margin-bottom: 4px;
    font-weight: 600;
    word-break: break-all;
  }

  #detail .location {
    color: var(--text-dim);
    font-size: 11px;
    margin-bottom: 16px;
  }

  #detail section {
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }

  #detail section:last-child { border-bottom: 0; }

  #detail section h4 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 8px;
    font-weight: 600;
  }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 10px;
    margin: 2px 4px 2px 0;
    color: var(--text-bright);
  }

  .caller-item {
    padding: 6px 10px;
    background: var(--bg);
    border-radius: 3px;
    margin-bottom: 4px;
    font-size: 11px;
    cursor: pointer;
    border: 1px solid transparent;
  }

  .caller-item:hover { border-color: var(--border); }

  .caller-item .line { color: var(--text-dim); font-size: 10px; }

  button.action {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    margin-right: 6px;
  }

  button.action:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  button.action:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  #narrative {
    margin-top: 10px;
    font-size: 11.5px;
    line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
    background: var(--bg);
    padding: 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .search-hit {
    border-left: 2px solid var(--accent-amber) !important;
  }

  .loading {
    color: var(--text-dim);
    padding: 12px;
    font-size: 11px;
    font-style: italic;
  }
</style>
</head>
<body class="detail-closed">

<div id="header">
  <span class="logo">CARTOGRAPH</span>
  <span class="project-name" id="project-name"></span>
  <input id="search" placeholder="search functions (e.g. checkout, chflw)…" autocomplete="off">
  <div id="stats"></div>
</div>

<aside id="sidebar">
  <div id="entries-container" class="loading">loading…</div>
</aside>

<main id="canvas">
  <div id="cy"></div>
  <div id="empty-state">← pick an entry point to trace a flow</div>
  <div id="legend">
    <span><span class="swatch" style="background:#3b82f6"></span>api_route</span>
    <span><span class="swatch" style="background:#a78bfa"></span>celery_task</span>
    <span><span class="swatch" style="background:#fbbf24"></span>signal_handler</span>
    <span><span class="swatch" style="background:#34d399"></span>discovered</span>
    <span><span class="swatch" style="background:#475569"></span>function</span>
    <span style="margin-left:10px;border-left:1px solid var(--border);padding-left:10px;color:var(--text-dim)">
      <span style="border-top:1px dashed #f472b6;display:inline-block;width:18px;vertical-align:middle"></span> async
      <span style="border-top:1px solid #a78bfa;display:inline-block;width:18px;margin-left:8px;vertical-align:middle"></span> cross-file
      <span style="border-top:1px dashed #fbbf24;display:inline-block;width:18px;margin-left:8px;vertical-align:middle"></span> conditional
    </span>
  </div>
</main>

<aside id="detail">
  <div id="detail-content"></div>
</aside>

<script>
// Register the dagre layout plugin. Some builds auto-register; doing it
// explicitly avoids the silent "nothing renders" failure when the global
// hookup doesn't fire.
if (typeof cytoscape !== 'undefined' && typeof cytoscapeDagre !== 'undefined') {
  cytoscape.use(cytoscapeDagre);
}

function pickLayout() {
  // Dagre if registered, else Cytoscape's built-in breadthfirst (no plugin).
  const ok = cytoscape.prototype.layout && cytoscape.prototype.layout.name !== undefined;
  // We always try dagre first; Cytoscape itself errors visibly if it's missing.
  try {
    return { name: 'dagre', rankDir: 'TB', nodeSep: 30, rankSep: 70 };
  } catch (e) {
    return { name: 'breadthfirst', directed: true, spacingFactor: 1.5 };
  }
}

const KIND_COLORS = {
  api_route: '#3b82f6',
  celery_task: '#a78bfa',
  celery_beat: '#c084fc',
  signal_handler: '#fbbf24',
  discovered: '#34d399',
  function: '#475569',
  method: '#64748b',
  class: '#f472b6',
};
const KIND_STROKES = Object.fromEntries(
  Object.entries(KIND_COLORS).map(([k, v]) => [k, shade(v, 20)])
);

function shade(hex, lum) {
  hex = hex.replace('#', '');
  const n = parseInt(hex, 16);
  const r = Math.min(255, ((n >> 16) & 255) + lum);
  const g = Math.min(255, ((n >> 8) & 255) + lum);
  const b = Math.min(255, (n & 255) + lum);
  return `rgb(${r},${g},${b})`;
}

const state = {
  overview: null,
  entryKinds: {},
  currentRoot: null,
  cy: null,
  cache: new Map(),  // qname → subgraph
};

async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`${path}: ${r.status}`);
  return r.json();
}

// ── Bootstrap ─────────────────────────────────────────────────────────

async function init() {
  state.overview = await api('/api/overview');
  document.getElementById('project-name').textContent = state.overview.project_name;

  const s = state.overview.stats;
  document.getElementById('stats').innerHTML = `
    <span><b>${s.total_functions}</b>fns</span>
    <span><b>${s.total_edges}</b>edges</span>
    <span><b>${s.total_entry_points}</b>entries</span>
    <span><b>${s.total_unresolved}</b>unresolved</span>`;

  renderSidebar(state.overview.entry_points_by_type);
  setupSearch();
  setupCy();

  // Auto-pick the first entry point so the canvas has something on load.
  const kinds = state.overview.entry_points_by_type;
  const firstKind = Object.keys(kinds)[0];
  if (firstKind && kinds[firstKind].length) {
    const first = kinds[firstKind].slice().sort((a, b) =>
      a.node_id.localeCompare(b.node_id)
    )[0];
    loadSubgraph(first.node_id).catch(err => console.error('auto-load failed:', err));
  }
}

// ── Sidebar: entry points grouped by kind ─────────────────────────────

function renderSidebar(byKind) {
  const order = ['api_route', 'celery_task', 'celery_beat', 'signal_handler', 'discovered'];
  const keys = [...new Set([...order.filter(k => byKind[k]), ...Object.keys(byKind)])];

  const container = document.getElementById('entries-container');
  container.classList.remove('loading');
  container.innerHTML = '';

  for (const kind of keys) {
    if (!byKind[kind] || !byKind[kind].length) continue;
    const group = document.createElement('div');
    group.className = 'group';
    const h = document.createElement('h3');
    h.innerHTML = `${kind.replace(/_/g, ' ')}<span class="count">${byKind[kind].length}</span>`;
    group.appendChild(h);

    for (const ep of byKind[kind].sort((a, b) => a.node_id.localeCompare(b.node_id))) {
      const item = document.createElement('div');
      item.className = 'entry-item';
      item.dataset.qname = ep.node_id;
      item.innerHTML = `
        <div class="qname">${escape(ep.node_id.split('.').pop())}</div>
        <div class="trigger">${escape(ep.trigger || '')} · ${escape(ep.node_id)}</div>`;
      item.onclick = () => loadSubgraph(ep.node_id);
      group.appendChild(item);
    }
    container.appendChild(group);
  }
}

// ── Cytoscape init ────────────────────────────────────────────────────

function setupCy() {
  state.cy = cytoscape({
    container: document.getElementById('cy'),
    style: [
      {
        selector: 'node',
        style: {
          'background-color': n => KIND_COLORS[n.data('kind')] || '#475569',
          'border-color': n => KIND_STROKES[n.data('kind')] || '#64748b',
          'border-width': 1.5,
          'label': n => n.data('label'),
          'color': '#e8ebf4',
          'text-valign': 'center',
          'text-halign': 'center',
          'font-size': 10,
          'font-family': 'SF Mono, monospace',
          'width': n => Math.max(40, Math.min(200, n.data('label').length * 6 + 16)),
          'height': 26,
          'shape': 'round-rectangle',
          'text-outline-color': n => KIND_COLORS[n.data('kind')] || '#475569',
          'text-outline-width': 2,
        },
      },
      {
        selector: 'node:selected',
        style: {
          'border-color': '#fbbf24',
          'border-width': 2.5,
        },
      },
      {
        selector: 'node.highlighted',
        style: {
          'border-color': '#60a5fa',
          'border-width': 2,
        },
      },
      {
        selector: 'edge',
        style: {
          'width': 1.2,
          'line-color': '#2a2e40',
          'target-arrow-color': '#2a2e40',
          'target-arrow-shape': 'triangle',
          'curve-style': 'bezier',
          'arrow-scale': 0.8,
        },
      },
      {
        selector: 'edge[condition]',
        style: {
          'line-style': 'dashed',
          'line-color': '#fbbf24',
          'target-arrow-color': '#fbbf24',
          'label': e => e.data('condition') || '',
          'font-size': 8,
          'color': '#fbbf24',
        },
      },
      {
        selector: 'edge[crossFile]',
        style: {
          'line-color': '#a78bfa',
          'target-arrow-color': '#a78bfa',
        },
      },
      {
        selector: 'edge[asyncKind]',
        style: {
          'line-color': '#f472b6',
          'target-arrow-color': '#f472b6',
          'line-style': 'dashed',
          'target-arrow-shape': 'vee',
          'width': 2,
          'label': e => (e.data('asyncKind') || '').replace('celery_', ''),
          'color': '#f472b6',
          'font-size': 9,
          'text-background-color': '#0b0d13',
          'text-background-opacity': 0.8,
          'text-background-padding': 2,
        },
      },
    ],
    layout: pickLayout(),
    wheelSensitivity: 0.2,
  });

  state.cy.on('tap', 'node', evt => showDetail(evt.target.data('qname')));
  state.cy.on('dbltap', 'node', evt => expandFrom(evt.target.data('qname')));
  state.cy.on('tap', e => { if (e.target === state.cy) closeDetail(); });
}

// ── Load subgraph for a root qname ────────────────────────────────────

async function loadSubgraph(qname) {
  document.querySelectorAll('.entry-item').forEach(el => el.classList.toggle('active', el.dataset.qname === qname));
  document.getElementById('empty-state').style.display = 'none';
  state.currentRoot = qname;

  let data = state.cache.get(qname);
  if (!data) {
    data = await api(`/api/graph/${encodeURIComponent(qname)}?depth=5`);
    state.cache.set(qname, data);
  }

  const elements = [];
  for (const [qn, node] of Object.entries(data.nodes)) {
    elements.push({
      data: {
        id: qn,
        qname: qn,
        label: node.name,
        kind: node.type,
        file: node.file,
        line: node.line_start,
        decorators: node.decorators || [],
      },
    });
  }
  for (const e of data.edges) {
    elements.push({
      data: {
        id: `${e.source}→${e.target}@${e.line}`,
        source: e.source,
        target: e.target,
        line: e.line,
        condition: e.condition,
        crossFile: e.is_cross_file,
        asyncKind: e.async_type,
      },
    });
  }

  state.cy.elements().remove();
  state.cy.add(elements);
  state.cy.layout(pickLayout()).run();
  state.cy.fit(null, 40);
}

// ── Expand from a node (append callees) ───────────────────────────────

async function expandFrom(qname) {
  const data = await api(`/api/graph/${encodeURIComponent(qname)}?depth=3`);
  const newEls = [];
  for (const [qn, node] of Object.entries(data.nodes)) {
    if (state.cy.getElementById(qn).empty()) {
      newEls.push({
        data: { id: qn, qname: qn, label: node.name, kind: node.type, file: node.file, line: node.line_start, decorators: node.decorators || [] },
      });
    }
  }
  for (const e of data.edges) {
    const id = `${e.source}→${e.target}@${e.line}`;
    if (state.cy.getElementById(id).empty()) {
      newEls.push({ data: { id, source: e.source, target: e.target, line: e.line, condition: e.condition, crossFile: e.is_cross_file, asyncKind: e.async_type } });
    }
  }
  if (!newEls.length) return;
  state.cy.add(newEls);
  state.cy.layout(pickLayout()).run();
}

// ── Detail panel ──────────────────────────────────────────────────────

async function showDetail(qname) {
  document.body.classList.remove('detail-closed');
  const panel = document.getElementById('detail-content');
  panel.innerHTML = '<div class="loading">loading…</div>';

  const node = state.cy.getElementById(qname).data();
  const [callers, status] = await Promise.all([
    api(`/api/callers/${encodeURIComponent(qname)}`),
    api('/api/llm-status'),
  ]);

  const decorators = node.decorators && node.decorators.length
    ? `<section><h4>decorators</h4>${node.decorators.map(d => `<span class="tag">@${escape(d)}</span>`).join('')}</section>`
    : '';

  const callerList = callers.callers.length
    ? callers.callers.map(c => `
        <div class="caller-item" onclick="loadSubgraph('${escapeJs(c.qualified_name)}')">
          <div>${escape(c.qualified_name.split('.').pop())}${c.is_cross_file ? ' <span class="line">(cross-file)</span>' : ''}</div>
          <div class="line">${escape(c.qualified_name)} · ${escape(c.file.split('/').pop())}:${c.line_start}</div>
        </div>`).join('')
    : '<div class="line">(none)</div>';

  panel.innerHTML = `
    <span class="close" onclick="closeDetail()">×</span>
    <h2>${escape(qname)}</h2>
    <div class="location">${escape(node.file || '')}:${node.line || ''}  ·  ${node.kind}</div>
    ${decorators}
    <section>
      <h4>callers (${callers.callers.length})</h4>
      ${callerList}
    </section>
    <section>
      <h4>actions</h4>
      <button class="action" onclick="loadSubgraph('${escapeJs(qname)}')">trace from here</button>
      <button class="action" onclick="expandFrom('${escapeJs(qname)}')">expand callees</button>
      <button class="action" id="narrate-btn" onclick="narrate('${escapeJs(qname)}')" ${status.available ? '' : 'disabled'}>${status.available ? 'narrate (LLM)' : 'LLM unavailable'}</button>
      <div id="narrative"></div>
    </section>`;
}

function closeDetail() {
  document.body.classList.add('detail-closed');
}

async function narrate(qname) {
  const btn = document.getElementById('narrate-btn');
  const out = document.getElementById('narrative');
  btn.disabled = true;
  btn.textContent = 'narrating…';
  try {
    const r = await api(`/api/narrate/${encodeURIComponent(qname)}?depth=4`);
    out.textContent = r.error ? `error: ${r.error}` : r.narrative;
  } catch (err) {
    out.textContent = `error: ${err.message}`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'narrate (LLM)';
  }
}

// ── Search ────────────────────────────────────────────────────────────

let searchTimer;
function setupSearch() {
  document.getElementById('search').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => doSearch(e.target.value.trim()), 160);
  });
}

async function doSearch(q) {
  document.querySelectorAll('.entry-item').forEach(el => el.classList.remove('search-hit'));
  if (!q) return;
  const data = await api(`/api/search?q=${encodeURIComponent(q)}&limit=30`);
  const hits = new Set(data.results.map(r => r.qualified_name));
  document.querySelectorAll('.entry-item').forEach(el => {
    if (hits.has(el.dataset.qname)) el.classList.add('search-hit');
  });
  // Also highlight matching nodes in the graph
  state.cy && state.cy.nodes().forEach(n => {
    n.toggleClass('highlighted', hits.has(n.data('qname')));
  });
}

// ── Utils ─────────────────────────────────────────────────────────────

function escape(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
}
function escapeJs(s) { return String(s || '').replace(/'/g, "\\'"); }

init().catch(e => {
  document.getElementById('entries-container').innerHTML = `<div style="padding:20px;color:#f87171;">${escape(e.message)}</div>`;
});
</script>
</body>
</html>
